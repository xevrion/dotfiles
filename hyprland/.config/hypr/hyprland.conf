autogenerated = 0

$terminal = ghostty
$fileManager = nautilus

exec-once = $terminal
exec-once = bash -c "wl-paste --watch cliphist store &"
exec-once = udiskie
exec-once = /usr/lib/mate-polkit/polkit-mate-authentication-agent-1
exec-once = qs -c noctalia-shell -d
exec-once = /home/xevrion/.local/bin/hypr-display-toggle guard


env = XCURSOR_SIZE,24
env = HYPRCURSOR_SIZE,24
env = ELECTRON_OZONE_PLATFORM_HINT,auto
env = NVD_BACKEND,direct
env = PATH,/home/xevrion/.local/bin:/home/xevrion/.bun/bin:$PATH
env = QT_QPA_PLATFORM,wayland
env = __GL_GSYNC_ALLOWED,0
env = __GL_VRR_ALLOWED,0
env = __NV_PRIME_RENDER_OFFLOAD,0
env = __GLX_VENDOR_LIBRARY_NAME,mesa
env = LIBVA_DRIVER_NAME,iHD
env = WLR_NO_HARDWARE_CURSORS,1


cursor {
    no_hardware_cursors = true
}

ecosystem {
  enforce_permissions = 1
}

permission = /usr/(bin|local/bin)/grim, screencopy, allow
permission = /usr/(lib|libexec|lib64)/xdg-desktop-portal-hyprland, screencopy, allow
permission = /usr/(bin|local/bin)/hyprpm, plugin, allow

general {
    gaps_in = 6
    gaps_out = 12

    border_size = 0

    resize_on_border = true

    allow_tearing = true
    extend_border_grab_area = 30

    layout = dwindle
}


dwindle {
    pseudotile = true
    preserve_split = true
}

master {
    new_status = master
}

misc {
    disable_hyprland_logo = true # If true disables the random hyprland logo / anime girl background. :)
    vfr = true
    vrr = 1
}

input {
    numlock_by_default = true

    follow_mouse = 1


    touchpad {
        natural_scroll = true
        tap-to-click = true
        tap-and-drag = true
        clickfinger_behavior = true
    }
}

gesture = 3, horizontal, workspace

###############################################

$mainMod = SUPER

bind = $mainMod, A, exec, $terminal
bind = $mainMod, Q, killactive,
bind = $mainMod SHIFT, Q, exit,
bind = $mainMod, E, exec, $fileManager
bind = $mainMod, T, togglefloating,
bind = $mainMod, P, pseudo, # dwindle
bind = $mainMod, J, togglesplit, # dwindle
bind = $mainMod SHIFT, C, exec, hyprpicker -a

bind = $mainMod, O, exec, qs -c noctalia-shell ipc call launcher toggle
bind = $mainMod, V, exec, qs -c noctalia-shell ipc call launcher clipboard
bind = $mainMod, N, exec, qs -c noctalia-shell ipc call notifications toggleHistory
bind = $mainMod, comma, exec, qs -c noctalia-shell ipc call settings toggle
bind = $mainMod ALT, L, exec, qs -c noctalia-shell ipc call sessionMenu lockAndSuspend
bind = $mainMod, X, exec, qs -c noctalia-shell ipc call sessionMenu toggle
bind = $mainMod, C, exec, qs -c noctalia-shell ipc call controlCenter toggle

bind = $mainMod, left, movefocus, h
bind = $mainMod, right, movefocus, l
bind = $mainMod, up, movefocus, k
bind = $mainMod, down, movefocus, j

bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

bind = $mainMod SHIFT, N, exec, qs -c noctalia-shell ipc call nightLight toggle

# bind = $mainMod, S, togglespecialworkspace, magic
bind = $mainMod, S, exec, ~/.local/bin/shot-window
bind = $mainMod SHIFT, S, movetoworkspace, special:magic


bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1

bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

bind = , Print, exec, grim -g "$(slurp)" ~/Pictures/$(date +'%Y-%m-%d_%H-%M-%S').png | wl-copy
bind = SHIFT, Print, exec, grim -g "$(slurp)" "$(xdg-user-dir PICTURES)/screenshot/screenshot_$(date +'%Y-%m-%d_%H%M%S').png"

bindl = , XF86AudioRaiseVolume, exec, qs -c noctalia-shell ipc call volume increase
bindl = , XF86AudioLowerVolume, exec, qs -c noctalia-shell ipc call volume decrease
bindl = , XF86AudioMute, exec, qs -c noctalia-shell ipc call volume muteOutput
bindl = , XF86AudioMicMute, exec, qs -c noctalia-shell ipc call media playPause
bindl = , XF86MonBrightnessUp, exec, qs -c noctalia-shell ipc call brightness increase
bindl = , XF86MonBrightnessDown, exec, qs -c noctalia-shell ipc call brightness decrease
bindel = ,XF86Calculator, exec, gnome-calculator

bindl = , XF86AudioNext, exec, qs -c noctalia-shell ipc call media next
bindl = , XF86AudioPause, exec, qs -c noctalia-shell ipc call media pause
bindl = , XF86AudioPlay, exec, qs -c noctalia-shell ipc call media play
bindl = , XF86AudioPrev, exec, qs -c noctalia-shell ipc call media previous

windowrule = suppressevent maximize, class:.*
windowrule = nofocus,class:^$,title:^$,xwayland:1,floating:1,fullscreen:0,pinned:0

monitor=HDMI-A-1,2560x1440@144,0x0,1
monitor=eDP-1,1920x1080@144,2560x0,1

animations {
    enabled = true

    bezier = wind, 0.05, 0.9, 0.1, 1.05
    bezier = winIn, 0.1, 1.1, 0.1, 1.1
    bezier = winOut, 0.3, -0.3, 0, 1
    bezier = liner, 1, 1, 1, 1
    bezier = overshot, 0.05, 0.9, 0.1, 1.1

    animation = windows, 1, 6, wind, slide
    animation = windowsIn, 1, 6, winIn, slide
    animation = windowsOut, 1, 5, winOut, slide
    animation = windowsMove, 1, 5, wind, slide
    animation = border, 1, 1, liner
    animation = fade, 1, 10, default
    animation = fadeDim, 1, 10, default
    animation = workspaces, 1, 5, overshot, slidevert
}

decoration {
    rounding = 10

    shadow {
        enabled = false
        range = 15
        render_power = 3
        color = rgba(1a1a1aee)
    }

    blur {
        enabled = false
        size = 6
        passes = 3
        new_optimizations = true
        xray = false
    }
}

general {
    border_size = 2
    col.active_border = rgba(b4beffee) rgba(cba6f7ee) 45deg
    col.inactive_border = rgba(45475aaa)
}

# When external is disconnected, laptop becomes primary
workspace = 1, monitor:HDMI-A-1, default:true
workspace = 2, monitor:HDMI-A-1
workspace = 3, monitor:HDMI-A-1
workspace = 4, monitor:HDMI-A-1
workspace = 5, monitor:HDMI-A-1
workspace = 6, monitor:eDP-1
workspace = 7, monitor:eDP-1
workspace = 8, monitor:eDP-1
workspace = 9, monitor:eDP-1
workspace = 10, monitor:eDP-1

# Move window to other monitor
bind = $mainMod SHIFT, left, movewindow, mon:-1
bind = $mainMod SHIFT, right, movewindow, mon:+1
bind = $mainMod SHIFT, up, movewindow, mon:-1
bind = $mainMod SHIFT, down, movewindow, mon:+1

# Resize windows with Super + Alt + arrows
bind = $mainMod ALT, right, resizeactive, 30 0
bind = $mainMod ALT, left, resizeactive, -30 0
bind = $mainMod ALT, up, resizeactive, 0 -30
bind = $mainMod ALT, down, resizeactive, 0 30

# Scratchpad terminal (Super + `) — pull up a floating terminal anytime
# bind = $mainMod, grave, togglespecialworkspace, scratchpad
bind = $mainMod, grave, exec, ~/.local/bin/shot-region
bind = $mainMod SHIFT, grave, movetoworkspace, special:scratchpad

# Screenshot full screen
bind = $mainMod, Print, exec, grim - | wl-copy

# Lock screen
bind = $mainMod ALT, L, exec, hyprlock

# Move floating windows with keyboard
bind = $mainMod CTRL, left, moveactive, -30 0
bind = $mainMod CTRL, right, moveactive, 30 0
bind = $mainMod CTRL, up, moveactive, 0 -30
bind = $mainMod CTRL, down, moveactive, 0 30

# Fullscreen
bind = $mainMod, F, fullscreen, 0

# Fake fullscreen (app thinks it's fullscreen but stays in tiling)
bind = $mainMod SHIFT, F, fullscreen, 1

# Force split direction
bind = $mainMod, B, togglesplit
bind = $mainMod, F10, exec, /home/xevrion/.local/bin/hypr-display-toggle toggle

# Disable idle/sleep behavior
misc {
    disable_autoreload = false
    mouse_move_enables_dpms = true
    key_press_enables_dpms = true
}

# Force iGPU for rendering, dGPU only when needed
env = QT_STYLE_OVERRIDE,adwaita-dark
misc {
    vfr = true
}

input {
    sensitivity = -0.2
    accel_profile = flat
}
exec-once = gnome-keyring-daemon --start --components=secrets

#windowrulev2 = opacity 0.94 0.94, class:.*
bind = $mainMod, W, exec, qs -c noctalia-shell ipc call wallpaper random ""
misc {
    enable_swallow = true
}


exec-once = vicinae server

# use whatever shortcut floats your boat
bind = $mainMod, Space, exec, vicinae toggle



# layerrule = blur, vicinae  # disabled: blur is off globally; this was forcing blur shader on vicinae layer
layerrule = ignorealpha 0, vicinae

layerrule = noanim, vicinae
layerrule = noanim, noctalia-image-cache-renderer

